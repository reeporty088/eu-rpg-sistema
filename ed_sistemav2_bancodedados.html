<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Dados V2 - Escória de Deus</title>
    <style>
        :root { 
            --bg: #111111; 
            --text: #ffffff;
            --theme-main: #800000;
            --theme-card: #2a0b10;
            --theme-border: #5a1a1f;
            --theme-input: #1a0508;
            --theme-light: #ffaaaa;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        h1 { text-align: center; color: var(--theme-light); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,170,170,0.3); border-bottom: 2px solid var(--theme-main); padding-bottom: 10px; margin-bottom: 20px; }
        
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* --- NAVEGAÇÃO DE ABAS --- */
        .tab-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: rgba(0,0,0,0.5); border: 2px solid var(--theme-border); color: #aaa; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        .tab-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .tab-btn.active { background: var(--theme-main); color: white; border-color: var(--theme-light); box-shadow: 0 0 15px rgba(255, 170, 170, 0.4); }

        .card { background: var(--theme-card); border-radius: 12px; padding: 20px; border: 1px solid var(--theme-border); box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .header-label { background: var(--theme-main); text-align: center; border-radius: 8px; padding: 10px 15px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--theme-light); display: flex; justify-content: space-between; align-items: center; }
        
        .btn-add { background: #22aa22; color: white; border: 1px solid #55ff55; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 12px; }
        .btn-add:hover { background: #2ebd2e; box-shadow: 0 0 10px #55ff55; }
        
        /* --- LISTA DE VANTAGENS PASSIVAS --- */
        .item-row { display: flex; flex-direction: column; background: rgba(0,0,0,0.4); border: 1px solid var(--theme-border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
        .item-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); cursor: pointer; }
        .item-title { font-weight: bold; font-size: 16px; color: var(--theme-light); }
        .item-controls { display: flex; gap: 10px; }
        .btn-edit { background: #d4a017; color: #000; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .btn-del { background: #c62828; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .item-desc { padding: 15px; font-size: 13px; color: #ccc; display: none; border-top: 1px solid var(--theme-border); white-space: pre-wrap; line-height: 1.5; }
        .item-desc.open { display: block; }

        /* --- VISUAL DOS CARDS (Domínio, Classes e Raças) --- */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .filter-bar select { width: auto; flex-grow: 1; margin: 0; }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .skill-card { background: linear-gradient(145deg, #1a0508 0%, #0d0204 100%); border: 1px solid var(--theme-border); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; position: relative; box-shadow: 0 5px 10px rgba(0,0,0,0.5); transition: 0.3s; }
        .skill-card:hover { border-color: var(--theme-light); transform: translateY(-3px); }
        
        .card-badges { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-domain { background: var(--theme-main); color: white; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--theme-light); }
        .badge-level { background: #d4a017; color: black; padding: 3px 8px; border-radius: 4px; }
        
        .card-title { font-size: 18px; font-weight: bold; color: var(--theme-light); margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        .card-meta { font-size: 11px; color: #aaa; margin-bottom: 10px; line-height: 1.6; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; }
        .card-meta strong { color: #ddd; }
        
        .card-desc { font-size: 13px; color: #ccc; line-height: 1.5; flex-grow: 1; white-space: pre-wrap; margin-bottom: 15px; }
        
        .card-actions { display: flex; justify-content: flex-end; gap: 5px; border-top: 1px solid #333; padding-top: 10px; margin-top: auto; }

        /* Modais */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--theme-card); padding: 20px; border-radius: 12px; border: 2px solid var(--theme-main); width: 600px; max-width: 100%; margin: auto; max-height: 90vh; overflow-y: auto; }
        
        input, textarea, select { width: 100%; background: var(--theme-input); border: 1px solid #555; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; }
        label { font-size: 11px; color: var(--theme-light); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
        .btn-save { background: var(--theme-main); color: white; border: 1px solid var(--theme-light); padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-cancel { background: #444; color: white; border: 1px solid #777; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<h1>Compêndio do Mestre</h1>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('cartas', this)">🎴 Cartas de Domínio</button>
    <button class="tab-btn" onclick="switchTab('passivas', this)">🛡️ Vantagens Passivas</button>
    <button class="tab-btn" onclick="switchTab('classes', this)">⚔️ Classes</button>
    <button class="tab-btn" onclick="switchTab('racas', this)">🧬 Raças</button>
</div>

<div class="container">
    
    <div class="card" id="sec_cartas" style="display: block;">
        <div class="header-label">
            <span>Cartas de Domínio</span>
            <button class="btn-add" onclick="openCartaForm()">+ Criar Carta</button>
        </div>
        
        <div class="filter-bar">
            <label style="margin:0;">Filtrar por Domínio:</label>
            <select id="filter_dominio" onchange="applyFilter()">
                <option value="Todos">Todos os Domínios</option>
                <option value="Domínio Arcano">Domínio Arcano</option>
                <option value="Domínio da Bravura">Domínio da Bravura</option>
                <option value="Domínio do Códice">Domínio do Códice</option>
                <option value="Domínio do Esplendor">Domínio do Esplendor</option>
                <option value="Domínio da Graça">Domínio da Graça</option>
                <option value="Domínio da Lâmina">Domínio da Lâmina</option>
                <option value="Domínio da Meia-Noite">Domínio da Meia-Noite</option>
                <option value="Domínio do Osso">Domínio do Osso</option>
                <option value="Domínio do Sábio">Domínio do Sábio</option>
            </select>
        </div>

        <div class="cards-grid" id="list_cartas">
            <div style="grid-column: 1 / -1; text-align:center; padding: 20px; color:#666;">Carregando Cartas do Banco de Dados...</div>
        </div>
    </div>

    <div class="card" id="sec_passivas" style="display: none;">
        <div class="header-label" style="background: #222; border-color: #555;">
            <span style="color: #ccc;">Vantagens Passivas</span>
            <button class="btn-add" style="background: #444; border-color: #777;" onclick="openPassivaForm()">+ Criar Passiva</button>
        </div>
        <div id="list_passivas"></div>
    </div>

    <div class="card" id="sec_classes" style="display: none;">
        <div class="header-label" style="background: #112233; border-color: #336699;">
            <span style="color: #88ccff;">Classes</span>
            <button class="btn-add" style="background: #224466; border-color: #4488cc;" onclick="openClasseForm()">+ Criar Classe</button>
        </div>
        <div class="cards-grid" id="list_classes"></div>
    </div>

    <div class="card" id="sec_racas" style="display: none;">
        <div class="header-label" style="background: #1a331a; border-color: #339933;">
            <span style="color: #88ff88;">Raças / Ancestralidades</span>
            <button class="btn-add" style="background: #226622; border-color: #55cc55;" onclick="openRacaForm()">+ Criar Raça</button>
        </div>
        <div class="cards-grid" id="list_racas"></div>
    </div>

</div>

<div class="modal-overlay" id="modal-passiva">
    <div class="modal-box">
        <h3 id="form_passiva_title" style="margin-top:0; color:var(--theme-light); border-bottom:1px solid #555; padding-bottom:10px;">CRIAR VANTAGEM PASSIVA</h3>
        <input type="hidden" id="passiva_id">
        <label>Nome da Vantagem</label>
        <input type="text" id="passiva_titulo">
        <label>Descrição e Regras</label>
        <textarea id="passiva_desc" rows="6"></textarea>
        <div class="form-buttons">
            <button class="btn-cancel" onclick="document.getElementById('modal-passiva').classList.remove('open')">Cancelar</button>
            <button class="btn-save" onclick="savePassiva()">Salvar no Banco</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-carta">
    <div class="modal-box">
        <h3 id="form_carta_title" style="margin-top:0; color:var(--theme-light); border-bottom:1px solid #555; padding-bottom:10px;">CRIAR CARTA DE DOMÍNIO</h3>
        <input type="hidden" id="carta_id">
        
        <label>Nome da Carta / Técnica</label>
        <input type="text" id="carta_titulo" placeholder="Ex: Bola de Fogo">
        
        <div class="form-row">
            <div>
                <label>Domínio</label>
                <select id="carta_dominio">
                    <option value="Domínio Arcano">Domínio Arcano</option>
                    <option value="Domínio da Bravura">Domínio da Bravura</option>
                    <option value="Domínio do Códice">Domínio do Códice</option>
                    <option value="Domínio do Esplendor">Domínio do Esplendor</option>
                    <option value="Domínio da Graça">Domínio da Graça</option>
                    <option value="Domínio da Lâmina">Domínio da Lâmina</option>
                    <option value="Domínio da Meia-Noite">Domínio da Meia-Noite</option>
                    <option value="Domínio do Osso">Domínio do Osso</option>
                    <option value="Domínio do Sábio">Domínio do Sábio</option>
                </select>
            </div>
            <div>
                <label>Nível</label>
                <select id="carta_nivel">
                    <option value="1">Nível 1</option><option value="2">Nível 2</option>
                    <option value="3">Nível 3</option><option value="4">Nível 4</option>
                    <option value="5">Nível 5</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div>
                <label>Tipo</label>
                <input type="text" id="carta_tipo" placeholder="Ex: Magia Destrutiva">
            </div>
            <div>
                <label>Custo</label>
                <input type="text" id="carta_custo" placeholder="Ex: 2 Pontos de Estresse">
            </div>
        </div>

        <label>Efeito (Descrição Completa)</label>
        <textarea id="carta_desc" rows="5" placeholder="Descreva o que acontece ao usar a carta..."></textarea>
        
        <div class="form-buttons">
            <button class="btn-cancel" onclick="document.getElementById('modal-carta').classList.remove('open')">Cancelar</button>
            <button class="btn-save" onclick="saveCarta()">Salvar no Banco</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-classe">
    <div class="modal-box">
        <h3 id="form_classe_title" style="margin-top:0; color:#88ccff; border-bottom:1px solid #336699; padding-bottom:10px;">CRIAR CLASSE</h3>
        <input type="hidden" id="classe_id">
        <label>Nome da Classe</label>
        <input type="text" id="classe_titulo" placeholder="Ex: Vanguarda">
        <label>Descrição / Lore</label>
        <textarea id="classe_desc" rows="3" placeholder="Pequeno texto narrativo sobre a classe..."></textarea>
        <label>Domínios</label>
        <input type="text" id="classe_dominios" placeholder="Ex: Lâmina (Corpo a corpo) e Bravura (Defesa)">
        
        <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px dashed #555; margin-bottom: 15px;">
            <label style="color:#ffaaaa;">Nome da Habilidade Base</label>
            <input type="text" id="classe_hab_nome" placeholder="Ex: Postura Inabalável" style="margin-bottom:10px;">
            <label style="color:#ffaaaa;">Descrição da Habilidade Base</label>
            <textarea id="classe_hab_desc" rows="4" placeholder="Efeitos mecânicos da habilidade principal da classe..."></textarea>
        </div>

        <div class="form-buttons">
            <button class="btn-cancel" onclick="document.getElementById('modal-classe').classList.remove('open')">Cancelar</button>
            <button class="btn-save" onclick="saveClasse()">Salvar no Banco</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-raca">
    <div class="modal-box">
        <h3 id="form_raca_title" style="margin-top:0; color:#88ff88; border-bottom:1px solid #339933; padding-bottom:10px;">CRIAR RAÇA / ANCESTRALIDADE</h3>
        <input type="hidden" id="raca_id">
        
        <div class="form-row">
            <div>
                <label>Nome da Raça</label>
                <input type="text" id="raca_titulo" placeholder="Ex: Dragór">
            </div>
            <div>
                <label>Linhagem</label>
                <select id="raca_linhagem">
                    <option value="Animalesco">Animalesco</option>
                    <option value="Demoníaco">Demoníaco</option>
                    <option value="Sacra">Sacra</option>
                </select>
            </div>
        </div>

        <label>Descrição / Lore</label>
        <textarea id="raca_desc" rows="3" placeholder="Pequeno texto narrativo sobre a raça e suas origens..."></textarea>
        
        <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px dashed #555; margin-bottom: 10px;">
            <label style="color:#ffaaaa;">Traço / Habilidade 1</label>
            <input type="text" id="raca_hab1_nome" placeholder="Nome do Traço 1">
            <textarea id="raca_hab1_desc" rows="2" placeholder="Efeito mecânico..."></textarea>
        </div>

        <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px dashed #555; margin-bottom: 10px;">
            <label style="color:#ffaaaa;">Traço / Habilidade 2</label>
            <input type="text" id="raca_hab2_nome" placeholder="Nome do Traço 2">
            <textarea id="raca_hab2_desc" rows="2" placeholder="Efeito mecânico..."></textarea>
        </div>

        <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px dashed #555; margin-bottom: 15px;">
            <label style="color:#ffaaaa;">Traço / Habilidade 3 (Opcional)</label>
            <input type="text" id="raca_hab3_nome" placeholder="Nome do Traço 3">
            <textarea id="raca_hab3_desc" rows="2" placeholder="Efeito mecânico..."></textarea>
        </div>

        <div class="form-buttons">
            <button class="btn-cancel" onclick="document.getElementById('modal-raca').classList.remove('open')">Cancelar</button>
            <button class="btn-save" onclick="saveRaca()">Salvar no Banco</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCvxxwfsonP5a45nbcz34cxYhXaWBZVhwQ",
        authDomain: "ed-rpg---sistema-de-fichas.firebaseapp.com",
        databaseURL: "https://ed-rpg---sistema-de-fichas-default-rtdb.firebaseio.com",
        projectId: "ed-rpg---sistema-de-fichas",
        storageBucket: "ed-rpg---sistema-de-fichas.firebasestorage.app",
        messagingSenderId: "350999444010",
        appId: "1:350999444010:web:d89f31d13e449b8fbfa153"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbPath = `banco_dados_v2`;

    let globalData = { passivas: {}, cartas: {}, classes: {}, racas: {} };
    let currentFilter = "Todos";

    // --- FUNÇÃO PARA TROCAR ABAS ---
    window.switchTab = (tabId, btnElement) => {
        document.getElementById('sec_cartas').style.display = 'none';
        document.getElementById('sec_passivas').style.display = 'none';
        document.getElementById('sec_classes').style.display = 'none';
        document.getElementById('sec_racas').style.display = 'none';
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(`sec_${tabId}`).style.display = 'block';
        btnElement.classList.add('active');
    };

    // ==========================================
    // DADOS PARA AUTO-POVOAMENTO DE CLASSES
    // ==========================================
    const classesPadrao = [
        { titulo: "Vanguarda", desc: "Os pilares de ferro do campo de batalha. Cavaleiros, mercenários pesados e a linha de frente inabalável.", dominios: "Lâmina (Combate corpo a corpo) e Bravura (Defesa e Proteção)", hab_nome: "Postura Inabalável", hab_desc: "Você é uma muralha. Uma vez por rodada, quando você for receber um Dano, você pode gastar 1 Ponto de Esperança para ignorar 1 Ponto de Vida daquele dano (absorvendo o impacto com o próprio corpo) OU gastar 2 Pontos de Estresse para redirecionar para você um ataque que atingiria um aliado Perto." },
        { titulo: "Arruaceiro", desc: "Sobreviventes das ruas, assassinos e ladinos. Eles prosperam no caos e agem antes que o inimigo perceba.", dominios: "Meia-Noite (Furtividade e Sombras) e Osso (Tática e Sobrevivência)", hab_nome: "Golpe Sujo", hab_desc: "Você sabe bater onde dói. Quando você ataca um inimigo que está focado em um aliado seu, ou quando você ataca furtivamente, você recebe Ganho na rolagem. Se acertar, pode gastar 1 Ponto de Esperança para somar +1d6 no seu dano total." },
        { titulo: "Monge", desc: "Combatentes que unificam o corpo físico com o fluxo de Arcana, canalizando os elementos primordiais através de seus punhos.", dominios: "Sábio (Natureza e Movimento) e Arcano (Magia Elemental)", hab_nome: "Fluxo Elemental", hab_desc: "Seus ataques desarmados contam como armas mágicas. Ao realizar um ataque corpo a corpo, você pode gastar 1 Ponto de Estresse para imbuí-lo com um elemento (Fogo, Água, Relâmpago, etc.). Além de causar dano mágico, se você rolar os dados Com Esperança, você aplica o efeito secundário do elemento (como Em Chamas ou Lentidão) sem custo adicional." },
        { titulo: "Arauto Dominante", desc: "Conjuradores temidos que manipulam os mortos e os espíritos, transformando o campo de batalha em seu exército pessoal.", dominios: "Códice (Magia de Controle) e Meia-Noite (Magia Sombria)", hab_nome: "Legião do Túmulo", hab_desc: "Você tem um Servo Espiritual (um esqueleto, morto-vivo ou fantasma) que age sob seu comando. Ele não tem turno próprio. Sempre que você realizar uma ação, pode gastar 1 Ponto de Esperança para fazer o Servo atacar um inimigo ou defender um aliado. Se o seu Servo for destruído, você sofre 2 Pontos de Estresse e precisa de um Descanso para reanimá-lo." },
        { titulo: "Teurgo", desc: "Os estudiosos definitivos da magia deste mundo, capazes de dobrar as leis da física através do puro Arcana intelectual.", dominios: "Códice (Utilidade Arcana) e Esplendor (Magia de Luz/Pura)", hab_nome: "Sobrecarga Mística", hab_desc: "Você pode forçar os limites do seu feitiço. Ao conjurar uma magia de suas cartas, você pode sofrer 1 Ponto de Estresse para aumentar o seu nível de sucesso. (Exemplo: Transformar uma Falha em um Sucesso com Medo, ou um Sucesso em um Sucesso Crítico). Se fizer isso, a magia se torna volátil, e o Mestre ganha 1 Ficha de Ação." },
        { titulo: "Performante", desc: "Bardos, dançarinos e artistas que usam a arte não apenas para entreter, mas para tecer ilusões e manipular emoções em combate.", dominios: "Graça (Mobilidade e Ilusão) e Sábio (Suporte e Conhecimento)", hab_nome: "O Show Tem que Continuar", hab_desc: "A sua arte contagia a equipe. Durante o combate, se você rolar os dados Com Esperança, você pode passar o Ponto de Esperança que você ganharia diretamente para um aliado. Além disso, uma vez por cena, você pode gastar 2 Pontos de Esperança para curar 2 Pontos de Estresse de todos os aliados que possam te ouvir ou ver." },
        { titulo: "Discípulo da Fé", desc: "Um conjurador moldado pela crença intensa nos deuses que amaldiçoam o mundo. Sua magia é carnal, punitiva e mexe com o psicológico.", dominios: "Esplendor (Magia Divina/Punição) e Meia-Noite (Medo e Corrupção)", hab_nome: "Evangelho Doloroso", hab_desc: "A sua fé se alimenta do sofrimento. Sempre que você aplicar um efeito negativo (como paralisia, medo ou cegueira) em um inimigo com uma magia, você pode gastar 1 Ponto de Esperança para curar 1 Ponto de Vida seu, OU pagar 1 Ponto de Estresse para estender a duração desse efeito negativo para o próximo turno." },
        { titulo: "Tecelante", desc: "Assassinos requintados e controladores macabros. Usam agulhas, linhas afiadas e venenos para transformar o campo de batalha em um palco de marionetes.", dominios: "Graça (Precisão e Elegância) e Osso (Armadilhas e Destreza)", hab_nome: "Fios do Destino", hab_desc: "Você manipula fios invisíveis de Arcana. Você pode gastar uma ação e 1 Ponto de Esperança para atar um fio a um inimigo ou aliado Perto. Fio no Aliado: Como reação, você pode puxá-lo para longe do perigo, dando a ele Ganho na Defesa contra um ataque. Fio no Inimigo: Quando ele tentar atacar, você puxa os fios para desequilibrá-lo, impondo Perda na rolagem de ataque dele. O fio se rompe se o alvo for para Longe." }
    ];

    // ==========================================
    // DADOS PARA AUTO-POVOAMENTO DE RAÇAS
    // ==========================================
    const racasPadrao = [
        // ANIMALESCO
        { titulo: "DRAGÓR", linhagem: "Animalesco", desc: "\"A cada anno, minhas escamas se tornam cada vez mais rígidas\"\nDragór são animais descendentes dos dragões cristalinos de aurora, com seus chifres, cauda e poderes de fogo, costumam ser predadores que quando dominam suas habilidades, causam medo em exércitos inteiros, porém costumam ser bem pacíficos na maior parte do tempo. Alguns Dragór's desenvolvem asas ao longo do seu crescimento, outros desenvolvem uma cauda maior que o normal.", hab1_nome: "Baforada de Aurora", hab1_desc: "Uma vez por combate, você pode gastar 1 Ponto de Esperança para realizar um ataque elemental em área (Perto). Role 2d12 + Poder. Se acertar, causa dano mágico. Se a rolagem for Com Esperança, você limpa 1 Estresse.", hab2_nome: "Poder Dracônico", hab2_desc: "A sua presença impõe respeito. Você tem Ganho (Vantagem) em testes de Poder que envolvam pura demonstração de força ou intimidação.", hab3_nome: "Herança Física (Escolha uma)", hab3_desc: "Asas: Você pode voar, ignorando terrenos difíceis.\nCauda Longa: Serve como um membro extra. Uma vez por rodada, você pode realizar uma ação rápida para interagir com o cenário (puxar uma alavanca, segurar um item) sem gastar o seu turno." },
        { titulo: "ETÍNARO", linhagem: "Animalesco", desc: "\"Se você continuar me olhando torto, eu vou enfiar meu chifre na sua cara\"\nEtínaros são animais descendentes dos sátiros guardiões da gloriosa Era de Paz, possuem orelhas grandes, chifres arredondados, garras nas mãos e pernas grandes e fortes com cascos no lugar nos pés, além de um olho amarelo brilhante bem forte. Costumam ser bem fortes e resistentes, sendo um grande atrativo para exércitos que buscam uma linha de frente.", hab1_nome: "Corpo Táurico (Investida)", hab1_desc: "A sua força de arranque é assustadora. Você recebe Ganho em rolagens em testes de Habilidade para correr ou perseguir um alvo.", hab2_nome: "Vigoroso", hab2_desc: "A sua pele é robusta e a sua saúde é de ferro. Você tem Ganho em testes de Resistência contra fadiga, doenças e venenos.", hab3_nome: "Resiliência Inabalável", hab3_desc: "Uma vez por combate, quando você sofrer um ataque que causaria um Dano Severo (perda de 3 PV), você pode pagar 2 Pontos de Estresse para forçar seu corpo a aguentar o impacto, reduzindo para um Dano Maior (perda de 2 PV)." },
        { titulo: "HARPIAN", linhagem: "Animalesco", desc: "\"Há todo o resplendor de minha graça, lhe deixo aqui a sós admirando meu voo\"\nHarpians são animais descendentes de grifos de outrora, com suas grandes asas, garras no lugar dos pés e pelagem distribuída no corpo, seu voo é gracioso e delicado e muito rápido. Alguns Harpians possuem as asas saindo das costas e outros possuem asas no lugar dos braços.", hab1_nome: "Voo Majestoso", hab1_desc: "Graças às suas grandes asas, você pode voar constantemente, se movendo pelos céus de forma graciosa e ignorando obstáculos no chão.", hab2_nome: "Graça Arcano-Aviária", hab2_desc: "A sua ligação com a magia é muito mais leve que a dos outros humanos. Uma vez por cena, ao conjurar uma magia ou ilusão de uma das suas Cartas de Domínio, você pode ignorar o custo de Esperança ou Estresse daquela carta.", hab3_nome: "Garras de Grifo", hab3_desc: "Você possui garras mortais. Seus ataques desarmados não contam como \"socos\", mas sim como armas cortantes rápidas, permitindo que você use Habilidade em vez de Poder." },
        { titulo: "LYZAARDO", linhagem: "Animalesco", desc: "\"Minha raça ja moldou essas terras, agora eu irei moldar o seu caráter\"\nLyzaardos são animais descendentes dos lagartos colossais que moldavam a terra como os deuses queriam, possuem uma pele muito resistente e são muito convictos na sua força de vontade. Geralmente nascem com pele escamosa e uma grande mandíbula, chifres e uma longa cauda.", hab1_nome: "Cascudo (Resistência e Vontade)", hab1_desc: "Você tem a mente e a pele duras. Você tem Ganho em testes de Resistência para evitar encantos, ilusões ou efeitos que tentem controlar a sua mente.", hab2_nome: "Camuflagem Natural", hab2_desc: "As suas escamas se adaptam ao ambiente e você sabe ter paciência de caçador. Você tem Ganho automático em todos os testes de Habilidade para se esconder.", hab3_nome: "Casca Grossa", hab3_desc: "Uma vez por combate, o primeiro ataque inimigo que causaria um Dano Menor (perda de 1 PV) simplesmente bate nas suas escamas e não arranca Vida nenhuma." },
        { titulo: "MENCE'S", linhagem: "Animalesco", desc: "\"...\"\nMence's são animais descendentes dos primatas guerreiros do apocalipse, são super ágeis e possuem uma localização excelente, além de serem um pouco cruéis. Possuem geralmente uma pelagem no corpo acompanhado de longos cabelos e uma cauda peluda.", hab1_nome: "Físico Atlético", hab1_desc: "Você é um mestre da mobilidade urbana e selvagem. Recebe Ganho em testes de Habilidade envolvendo acrobacias, escalar e saltos complexos.", hab2_nome: "Sentido Labiríntico", hab2_desc: "Você nunca se perde, sempre sabendo o caminho de volta de qualquer lugar em que tenha estado. Você também tem Ganho para farejar ou rastrear pistas.", hab3_nome: "Golpe Punitivo (Crueldade)", hab3_desc: "Seus ataques visam debilitar. Quando você acerta um inimigo com um Sucesso Crítico, além do bônus de dano, você aplica uma Punição entre as duas a seguir: o alvo fica atordoado ou tem a movimentação reduzida pela metade até o próximo turno dele." },
        { titulo: "MERMAID'S", linhagem: "Animalesco", desc: "\"Dos mares eu venho, mas o que reina é a minha vontade\"\nMermaid's são animais descendentes de crias da Rainha do Mar, humanoides com escamas, guelras e cauda, com a capacidade de respirar tanto fora quanto dentro d'agua. Geralmente nascem com guelras, antenas, escamas pelo corpo todo e uma cauda. Em alguns mermaid's, as caudas nascem como se fossem uma saia que se enrola nas pernas, se tornando uma cauda maior.", hab1_nome: "Adaptação Anfíbia", hab1_desc: "Você respira, enxerga e luta perfeitamente debaixo d'água, sem sofrer nenhuma penalidade por estar submerso.", hab2_nome: "Vigor das Profundezas", hab2_desc: "Acostumados a tolerar mudanças extremas de pressão, as Mermaid's têm o corpo muito duro. Você tem Ganho em testes de Resistência que envolvam impacto físico extremo ou asfixia.", hab3_nome: "Vontade Abissal", hab3_desc: "A água reage à sua presença. Em ambientes úmidos ou aquáticos, você pode gastar 1 Ponto de Esperança para ganhar uma Ficha de Ação extra para você ou um aliado." },
        { titulo: "NYTÁRA", linhagem: "Animalesco", desc: "\"Eu não me orgulho da minha origem\"\nNytáras são animais descendentes dos imensos felinos que habitavam Eko durante o Apocalipse, eram conhecidos por serem uma dos predadores mais agressivos de sua era, mas que ainda estão vivos hoje em dia em menor quantidade. Nytáras possuem orelhas na cabeça, garras no lugar das mãos, pernas de felinos e uma cauda felpuda. Não costumam ser tão agressivos quanto sua descendência.", hab1_nome: "Percepção Apurada", hab1_desc: "Seus ouvidos e olhos são armas de caça. Você tem Ganho em todos os testes de Habilidade para perceber emboscadas, notar detalhes ocultos ou ouvir ruídos sutis.", hab2_nome: "Predador Sanguinário", hab2_desc: "A sua energia se renova no calor da batalha. Sempre que você finalizar (derrotar) um inimigo corpo a corpo, você recupera imediatamente 1 Ponto de Vida ou limpa 2 Pontos de Estresse.", hab3_nome: "Aptidão Herdada (Explosão Felina)", hab3_desc: "Uma vez por sessão, antes de rolar os dados para um ataque corpo a corpo decisivo, você pode canalizar seu lado animal e transformar um dos seus d12 em um 12 natural (garantindo pelo menos um sucesso altíssimo ou um Sucesso Crítico se o outro dado também cair 12)." },
        
        // DEMONÍACO
        { titulo: "CARNÍTES", linhagem: "Demoníaco", desc: "\"Eu quero sangue, mas não de qualquer um, quero dos miseráveis enquanto eles sofrem na minha mão\"\nCarnítes são demônios que adoram violência e estão sempre caçando mais alvos para sua carnificina. Possuem olhos vermelhos (ou que se revelam vermelhos), pele pálida desnutrida, orelhas pontudas e presas afiadas.", hab1_nome: "Manipulação Sanguínea (Arma)", hab1_desc: "O sangue é sua ferramenta. Você pode gastar 1 Ponto de Esperança para coagular sangue (seu ou do ambiente) e formar uma arma letal de porte médio. Ataques com essa arma usam Poder e recebem bônus de dano.", hab2_nome: "Controle Visceral", hab2_desc: "Você consegue forçar a biologia do oponente. Gastando 1 Ponto de Estresse e uma ação, você força um inimigo Perto a fazer um teste de Resistência. Se ele falhar, você dita o próximo movimento dele (para onde ele anda ou quem ele solta).", hab3_nome: "Talento Violento", hab3_desc: "Você tem Ganho em testes de Poder para destruir objetos ou intimidar inimigos feridos." },
        { titulo: "DUSA", linhagem: "Demoníaco", desc: "\"Tudo que eu quero é o que eu mereço, nada menos que isso\"\nDusas são demônios sedutores, carismáticos e um pouco frágeis, buscando riquezas e conquistando alvos que possam lhe fornecer seus desejos. Possuem de 1 a 6 cabeças de cobra ligada ao corpo, as vezes nas costas, braços, cabeça, cabelos ou até mesmo como uma cauda.", hab1_nome: "Fascínio Ofídico (Carisma)", hab1_desc: "A sua presença é hipnótica. Você recebe Ganho automático em testes de Habilidade ou Poder que envolvam influenciar, seduzir ou enganar algum alvo.", hab2_nome: "Olhar Atordoante", hab2_desc: "O seu olhar paralisa. Gastando 1 Ponto de Esperança e uma ação, você foca seu olhar em um alvo. Ele rola Resistência contra o seu Poder; se falhar, o inimigo fica Atordoado (não pode agir no próximo turno dele, apenas se mover).", hab3_nome: "Múltiplas Cabeças", hab3_desc: "As serpentes em seu corpo servem como vigias. Inimigos nunca ganham vantagem por te atacar furtivamente ou pelas costas." },
        { titulo: "FILHO DE MIRAH", linhagem: "Demoníaco", desc: "\"Não sou um demônio comum, sou puro, livre de podridão\"\nUm descendente distante, mas com sangue puro. Filhos de Mirah são alguns dos últimos demônios com sangue direto do Rei Demônio, são especiais, não pelas habilidades, mas pela conexão direta com o inferno que os concede capacidades únicas sempre que mais necessitam.", hab1_nome: "Bênção do Inferno (Escamas)", hab1_desc: "O seu corpo reage ao perigo extremo. Uma vez por combate, como uma reação quando for atacado, você pode gastar 1 Ponto de Esperança para endurecer sua pele em escamas demoníacas. Isso conta como um Slot de Armadura gratuito, absorvendo o dano daquele ataque sem quebrar seu equipamento.", hab2_nome: "Empatia Selvagem", hab2_desc: "Apesar do sangue demoníaco, você é puro e a natureza sente isso. Você tem Ganho constante para interagir, acalmar ou domar animais e feras.", hab3_nome: "Aura de Comando", hab3_desc: "Ao ajudar um aliado, se você gastar 1 Esperança para dar a ele uma vantagem extra, você próprio recebe 1 Esperança de volta caso ele tenha um Sucesso Crítico." },
        { titulo: "INFERMO", linhagem: "Demoníaco", desc: "\"Antes, tudo me fazia sentir dor, hoje eu faço eles sentirem dor\"\nInfermos são a mistura de várias capacidades do Rei Demônio em um corpo comum, eles sofrem com deformações, anomalias e dificuldades em geral, mas quando dominam suas fraquezas, passam a ser ameaçadores tanto quanto um Semi-Deus. Podem possuir caudas, asas, chifres, manchas estranhas, deformidades, vários membros, e várias particularidades fora do comum.", hab1_nome: "Asas do Abismo (Voo)", hab1_desc: "Apesar das deformidades do seu corpo, você possui um par de asas grotescas e funcionais, permitindo voo livre e ignorando terrenos difíceis.", hab2_nome: "Anomalia Útil (Deformidade)", hab2_desc: "A sua deformidade te ajuda de formas estranhas. Escolha um tipo de ação (ex: escalar, arrombar, ouvir, intimidar). Você sempre tem Ganho nesse teste específico, pois seu corpo é bizarramente adaptado a ele.", hab3_nome: "Teratismo (Magia Anômala)", hab3_desc: "Você possui um dom bizarro. Ao criar o personagem, escolha uma carta de Domínio nível 1 de qualquer classe. Você pode usá-la como se fosse da sua classe, e a primeira vez que a conjurar no dia, não paga o custo de Estresse/Esperança." },
        { titulo: "ONÍ", linhagem: "Demoníaco", desc: "\"Aqui eu faço meu chamado a meu pai distante, direto do Inferno\"\nEm meio a tantos amaldiçoados, Oní's são demônios abençoados, sem deformidades, mas sem particularidades especiais, além da capacidade de usar o Chamado do Inferno. Possuem pele vermelha ou azulada, chifres, cauda longa com uma flecha na ponta, porém, não são todos que possuem essas características.", hab1_nome: "Elegância Impecável", hab1_desc: "Você se move e pensa com uma graça sobrenatural. Uma vez por cena, se você rolar uma Falha, você pode gastar 1 Ponto de Esperança para rolar novamente um dos d12 e aceitar o novo resultado.", hab2_nome: "Natureza Mística Intensa", hab2_desc: "O Arcana pulsa perfeitamente em você. Você recebe Ganho em testes de Habilidade ou Poder sempre que tentar entender rituais mágicos, rastrear fontes de magia ou decifrar grimórios.", hab3_nome: "Chifres de Combate", hab3_desc: "Seus chifres são armas. Se você fizer uma investida antes de atacar corpo a corpo, você pode rolar o dano duas vezes e ficar com o melhor resultado." },
        { titulo: "RECEPTÁCULO", linhagem: "Demoníaco", desc: "\"Eu queria ser igual a você, um corpo e alma, mas agora sou somente um dos dois... e vou atrás do outro\"\nReceptáculos são um corpo artificial em que sua alma foi colocada, geralmente como bonecos que imitam o corpo humano ou de alguma criatura.", hab1_nome: "Corpo Abiótico (Imune)", hab1_desc: "Você é um construto. Não precisa respirar, comer ou dormir, e é completamente imune a doenças orgânicas e venenos. Em contrapartida, magias de cura convencionais não funcionam em você; você precisa ser Consertado durante descansos curtos/longos.", hab2_nome: "Bateria Arcana", hab2_desc: "O seu núcleo te sustenta. Você tem Ganho para resistir à exaustão física, mas se seus Pontos de Vida chegarem a 0, você não \"morre\", você apenas \"desliga\" até ser recarregado/consertado.", hab3_nome: "Membros Artificiais Múltiplos", hab3_desc: "Você possui braços extras. Você pode interagir com itens, sacar/guardar armas ou usar itens consumíveis como uma ação livre (sem gastar o seu turno)." },
        { titulo: "SANGUINÁRIO CARMESIM", linhagem: "Demoníaco", desc: "\"Sangue, carnificina, medo, vermelho, presas, pulso... guerra\"\nSanguinários carmesim antes eram apenas sanguinários, demônios que tinham a capacidade de se curar com sangue dos inimigos, após a Guerra de Sangue, foram amaldiçoados novamente, se tornando algumas das criaturas mais temidas de Eko. Possuem cabelos vermelhos e capacidades especiais ao ingerir sangue.", hab1_nome: "Carnificina Brutal", hab1_desc: "A dor do inimigo é o seu combustível. Sempre que você derrotar um oponente ou causar um Dano Severo (3 PV), você recupera 1 Ponto de Vida ou ganha 1 Ficha de Ação extra para agir novamente naquele turno.", hab2_nome: "Bênção do Sangue", hab2_desc: "O sangue te fortalece. Como uma ação livre, quando você fere um inimigo e ele sangra, você pode lamber/consumir aquele sangue. Até o final do combate, todos os seus ataques contra aquele alvo específico recebem Ganho.", hab3_nome: "Pele Robusta", hab3_desc: "Amaldiçoados duplamente, sua tolerância à dor é assustadora. Você recebe Ganho em qualquer teste de Resistência que envolva dor intensa, tortura física ou golpes incapacitantes." },

        // SACRA
        { titulo: "EMARANHADO", linhagem: "Sacra", desc: "\"Da terra viemos, pra terra retornamos\"\nUma lasca da natureza, a memória de uma civilização que vivia no meio do ninho coagulante em épocas de Paz. Emaranhados são humanos que nasceram com a maldição da raiz maldita e desenvolveram habilidades especiais com suas vinhas e conexão com natureza.", hab1_nome: "Membros de Vinha (+Membros)", hab1_desc: "Seu corpo é envolto por vinhas vivas. Você possui \"braços\" extras que podem segurar itens, interagir com o cenário ou atrapalhar inimigos. Uma vez por turno, você pode gastar 1 Ponto de Esperança para realizar uma ação de utilidade sem gastar o seu turno.", hab2_nome: "Exobiologia Arcano-Botânica", hab2_desc: "A sua biologia alienígena te torna eficiente. Uma vez por combate, você pode ativar uma de suas Cartas de Domínio (Magia/Habilidade) pagando apenas metade do custo de Estresse/Esperança (arredondado para baixo).", hab3_nome: "Raízes do Vazio (Incômodo)", hab3_desc: "Você não se dá bem em civilizações, mas reina na natureza. Você tem Ganho (Vantagem) automático em qualquer teste de sobrevivência, rastreio ou furtividade em ambientes selvagens." },
        { titulo: "ESFÉU", linhagem: "Sacra", desc: "\"Eu sinto a presença... o fio da realidade guia minha lâmina\"\nUm vislumbre de ser tocado pelo outro lado. Esféus são humanos amaldiçoados por um plano dimensional qual a mente comum não consegue distinguir, seu corpo tem funções biológicas estranhas, capacidades de regeneração e pode se morfar em um tecido místico qual é difícil compreender apenas olhando.", hab1_nome: "Transmorfo de Miasma", hab1_desc: "Você pode morfar sua carne em um tecido místico incompreensível. Gastando 2 Pontos de Estresse, você assume essa forma. Seus ataques corpo a corpo passam a usar Habilidade (em vez de Poder), causam dano mágico, e a primeira vez que você acerta um alvo, ele fica com Perda (Desvantagem) no próximo turno dele.", hab2_nome: "Regeneração Anômala", hab2_desc: "O seu corpo se reconstrói rapidamente. Se você estiver com a Vida abaixo da metade, você pode gastar 1 Ponto de Esperança no início do seu turno para curar 1 Ponto de Vida.", hab3_nome: "Desfavor", hab3_desc: "Você consegue focar sua aura negativa. Como uma reação, gaste 1 Ponto de Esperança para forçar um inimigo Perto a rolar um ataque ou defesa com Perda." },
        { titulo: "ESTRELA FANTASMA", linhagem: "Sacra", desc: "\"Por que tem que ser assim? Gastar tanta mana para ser... normal?\"\nO corpo de um espírito preso que volta a vida. Estrelas fantasma são humanos que durante a gestação, foram amaldiçoados por um espírito, fazendo com o que o mesmo ficasse com um corpo imaterial, eles tem que usar seu Arcana para ficar em uma forma física. Geralmente possuem macas e tatuagens vermelhas no corpo todo que brilham quando estão mudando entre o estado imaterial e fisíco.", hab1_nome: "Corpo Imaterial (Incorpóreo)", hab1_desc: "Você é um espírito que precisa de Arcana para se manter físico. Gastando 2 Pontos de Estresse e uma ação, você se torna intangível por uma rodada. Você fica imune a danos físicos mundanos e pode atravessar paredes, mas só pode atacar usando magias.", hab2_nome: "Aura de Paralisia", hab2_desc: "O pânico do além exala de você. Uma vez por combate, você pode forçar um inimigo a fazer um teste de Resistência. Se ele falhar, fica Paralisado de medo até sofrer algum dano.", hab3_nome: "Imunidade Espectral", hab3_desc: "Você é Imune a doenças orgânicas e não possui necessidades biológicas básicas (não morre de fome ou asfixia)." },
        { titulo: "LUNARIANO AMALDIÇOADO", linhagem: "Sacra", desc: "\"Qual seu desejo, mestre?\"\nAbençoado pela lua, amaldiçoado pelo ninho. Lunarianos são humanos com alta aptidão para magia concedidos pelo luar, mas que acabam sendo amaldiçoados pelo ninho coagulante durante o nascimento. Possuem geralmente a pele roxa ou acinzentada, além de marcas pretas no rosto.", hab1_nome: "Conceder Desejos", hab1_desc: "A sua magia brilha mais forte quando usada para os outros. Sempre que um aliado pedir para você conjurar uma magia benéfica nela ou para ela, o custo dessa magia é reduzido em 1 Ponto de Esperança ou Estresse. (Isso não gasta ações extras do aliado).", hab2_nome: "Fascínio Lunar", hab2_desc: "A sua aparência (pele acinzentada ou roxa e marcas místicas) é exótica e cativante. Você tem Ganho automático em testes para influenciar, persuadir ou encantar pessoas.", hab3_nome: "Código da Gratidão", hab3_desc: "Se alguém te salva ou te faz um favor imenso, você cria um vínculo. Enquanto estiver ajudando o seu \"Amo\", você pode passar qualquer Ponto de Esperança que você gerar nos dados diretamente para ele." },
        { titulo: "PINÁCULO DE MATÉRIA ESCURA", linhagem: "Sacra", desc: "\"Você não quer me deixar irritada, quer?\"\nVindo de um minério do ninho coagulante, pináculos de matéria escura são humanos amaldiçoados com uma pele que imita as rochas desse material. Sendo mais resistentes, fortes, geralmente são acompanhados por chifres cristalinos, pele completamente preta e uma cauda longa e afiada na ponta. Os pináculos foram amaldiçoados uma segunda vez após a segunda grande guerra que afetou muito o ninho coagulante e seus recursos, eles passaram a ter cabelos esbranquiçados e marcas brancas pelo corpo.", hab1_nome: "Pele de Rocha Negra (Vigoroso)", hab1_desc: "Seu corpo é incrivelmente denso, quase como um golem de matéria escura. Você tem Ganho em testes de Resistência contra doenças, exaustão física e impactos.", hab2_nome: "Destruidor", hab2_desc: "Você bate para quebrar. Em combate, quando você consegue um Sucesso Crítico ao atacar corpo a corpo, você pode gastar 1 Ponto de Esperança para dobrar o modificador de Poder adicionado ao dano.", hab3_nome: "Obstinação Obscura", hab3_desc: "Você consome o próprio corpo para continuar lutando. Se você não tiver Pontos de Esperança ou Estresse sobrando para usar uma habilidade, você pode escolher sofrer 1 Dano Menor (perder 1 PV) no lugar para ativá-la." },
        { titulo: "SACRA CONTIDO", linhagem: "Sacra", desc: "\"Usar mana machuca... eu não quero soltar as correntes\"\nAs vezes o nascimento apenas dá errado, mas existem casos que era melhor ter morrido. Sacras contidos possuem Arcana infinito, mas isso quase os corrói por dentro, seus corpos não foram feitos para aguentar tanta mana. Geralmente estão com equipamento para conter o Arcana o máximo possível, usando-o em doses menores.", hab1_nome: "Núcleos Inibidores", hab1_desc: "Seu corpo não aguenta sua própria mana. Você é considerado um Construto (imune a condições biológicas, mas curado por \"consertos\" além de descanso). Para conjurar qualquer habilidade de Classe, você gasta 1 Ponto de Estresse a mais do que o normal.", hab2_nome: "Fora de Contenção (A Quebra do Limite)", hab2_desc: "Uma vez por cena, você pode soltar as amarras. Gastando uma ação completa, asas de Arcana puro rasgam suas costas. Até o final da cena: você ganha Voo, todas as suas magias/habilidades custam ZERO, e seus ataques mágicos causam Dano Severo extra.", hab3_nome: "O Preço (Exaurido)", hab3_desc: "Assim que a cena termina, seus núcleos queimam. Você cai a 0 PV (inconsciente) e precisa ser resgatado e consertado/descansar para voltar à vida." },
        { titulo: "SACRA LIBERTO", linhagem: "Sacra", desc: "\"Eu sinto a conexão com o passado, o fluxo de mana é dolorido, porém, satisfatório\"\nUm ponto do verdadeiro Arcana. Sacras libertos possuem descendência direta da Era de Paz, com o Arcana fluindo em seu corpo da mesma forma que fluía no passado, mas seu corpo não consegue aguentar tanta mana dessa forma. Além de poder liberar todo seu Arcana quase infinito, consegue recupera-lo de forma extremamente eficiente.", hab1_nome: "Recarga Absoluta", hab1_desc: "Ao contrário do Contido, o Arcana flui em você como um rio. Uma vez por combate, ao derrotar um inimigo, você pode absorver a energia residual dele e recuperar imediatamente 2 Pontos de Esperança e limpar 2 de Estresse.", hab2_nome: "Arrebatar", hab2_desc: "Você controla a sorte ao seu redor. Você pode gastar 1 Ponto de Esperança e uma ação livre para conceder Ganho no próximo teste de um aliado que você consiga ver.", hab3_nome: "Libertação", hab3_desc: "O seu potencial é quase infinito, mas doloroso. Você pode forçar os limites da sua magia: pague 2 Pontos de Estresse para fazer uma magia funcionar como se você tivesse tirado um Sucesso Crítico nos dados, mas você sofre 1 Ponto de Dano no processo devido à sobrecarga carnal." }

    // ==========================================
    // LÓGICA PRINCIPAL DO FIREBASE
    // ==========================================
    onValue(ref(db, dbPath), (snapshot) => {
        const dados = snapshot.val();
        let needsUpdate = false;
        let updates = {};

        // Auto-povoar Passivas
        if (!dados || !dados.passivas) {
            passivasPadrao.forEach((item, index) => {
                updates[`${dbPath}/passivas/passiva_base_${index}`] = item;
            });
            needsUpdate = true;
        }
        
        // Auto-povoar Cartas
        if (!dados || !dados.cartas) {
            cartasPadrao.forEach((item, index) => {
                updates[`${dbPath}/cartas/carta_base_${index}`] = item;
            });
            needsUpdate = true;
        }

        // Auto-povoar Classes
        if (!dados || !dados.classes) {
            classesPadrao.forEach((item, index) => {
                updates[`${dbPath}/classes/classe_base_${index}`] = item;
            });
            needsUpdate = true;
        }

        // Auto-povoar Raças
        if (!dados || !dados.racas) {
            racasPadrao.forEach((item, index) => {
                updates[`${dbPath}/racas/raca_base_${index}`] = item;
            });
            needsUpdate = true;
        }

        if (needsUpdate) {
            update(ref(db), updates);
            return; 
        }

        // Adicionando a leitura de classes e raças ao globalData
        globalData = dados || { passivas: {}, cartas: {}, classes: {}, racas: {} };
        
        renderPassivas(globalData.passivas);
        renderClasses(globalData.classes);
        renderRacas(globalData.racas);
        applyFilter(); 
    });

    // --- RENDER PASSIVAS ---
    function renderPassivas(dataObj) {
        const container = document.getElementById(`list_passivas`);
        container.innerHTML = "";
        if (!dataObj) return;

        let itensArray = Object.keys(dataObj).map(key => ({ id: key, ...dataObj[key] }));
        itensArray.sort((a, b) => a.titulo.localeCompare(b.titulo));

        itensArray.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <div class="item-header" onclick="toggleDesc('${item.id}')">
                    <div class="item-title">${item.titulo}</div>
                    <div class="item-controls">
                        <button class="btn-edit" onclick="event.stopPropagation(); openPassivaForm('${item.id}')">✏️ Editar</button>
                        <button class="btn-del" onclick="event.stopPropagation(); deleteItem('passivas', '${item.id}')">🗑️</button>
                    </div>
                </div>
                <div class="item-desc" id="desc_${item.id}">${item.desc}</div>
            `;
            container.appendChild(div);
        });
    }

    // --- RENDER CLASSES ---
    window.renderClasses = (dataObj) => {
        const container = document.getElementById('list_classes');
        container.innerHTML = "";
        if (!dataObj) {
            container.innerHTML = "<div style='grid-column: 1 / -1; text-align:center;'>Nenhuma classe cadastrada.</div>";
            return;
        }

        let itensArray = Object.keys(dataObj).map(key => ({ id: key, ...dataObj[key] }));
        itensArray.sort((a,b) => a.titulo.localeCompare(b.titulo));

        itensArray.forEach(item => {
            container.innerHTML += `
            <div class="skill-card">
                <div class="card-title" style="color:#88ccff; border-color:#336699;">${item.titulo}</div>
                <div class="card-meta"><strong>Domínios:</strong> ${item.dominios || '-'}</div>
                <div class="card-desc" style="flex-grow:0; margin-bottom:10px;">${item.desc || ''}</div>
                
                <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px; margin-bottom:10px; border-left: 3px solid #336699; flex-grow:1;">
                    <strong style="color:#88ccff; font-size:12px;">Habilidade: ${item.hab_nome || 'Base'}</strong>
                    <div style="font-size:12px; color:#ccc; margin-top:5px; white-space:pre-wrap;">${item.hab_desc || ''}</div>
                </div>

                <div class="card-actions">
                    <button class="btn-edit" onclick="openClasseForm('${item.id}')">✏️ Editar</button>
                    <button class="btn-del" onclick="deleteItem('classes', '${item.id}')">🗑️ Apagar</button>
                </div>
            </div>`;
        });
    };

    // --- RENDER RAÇAS ---
    window.renderRacas = (dataObj) => {
        const container = document.getElementById('list_racas');
        container.innerHTML = "";
        if (!dataObj) {
            container.innerHTML = "<div style='grid-column: 1 / -1; text-align:center;'>Nenhuma raça cadastrada.</div>";
            return;
        }

        let itensArray = Object.keys(dataObj).map(key => ({ id: key, ...dataObj[key] }));
        itensArray.sort((a,b) => a.titulo.localeCompare(b.titulo));

        itensArray.forEach(item => {
            let habsHtml = "";
            for(let i=1; i<=3; i++) {
                if(item[`hab${i}_nome`]) {
                    habsHtml += `
                    <div style="background:rgba(0,0,0,0.4); padding:8px; border-radius:6px; margin-bottom:8px; border-left: 2px solid #339933;">
                        <strong style="color:#88ff88; font-size:11px;">${item[`hab${i}_nome`]}</strong>
                        <div style="font-size:11px; color:#ccc; margin-top:3px; white-space:pre-wrap;">${item[`hab${i}_desc`]}</div>
                    </div>`;
                }
            }

            container.innerHTML += `
            <div class="skill-card">
                <div class="card-badges">
                    <span class="badge-domain" style="background:#1a331a; border-color:#339933; color:#88ff88;">Linhagem: ${item.linhagem || 'Animalesco'}</span>
                </div>
                <div class="card-title" style="color:#88ff88; border-color:#339933;">${item.titulo}</div>
                <div class="card-desc" style="flex-grow:0; margin-bottom:10px;">${item.desc || ''}</div>
                
                <div style="flex-grow:1;">${habsHtml}</div>

                <div class="card-actions">
                    <button class="btn-edit" onclick="openRacaForm('${item.id}')">✏️ Editar</button>
                    <button class="btn-del" onclick="deleteItem('racas', '${item.id}')">🗑️ Apagar</button>
                </div>
            </div>`;
        });
    };

    // --- RENDER CARTAS (Com Filtro) ---
    window.applyFilter = () => {
        const filterEl = document.getElementById('filter_dominio');
        currentFilter = filterEl ? filterEl.value : "Todos";
        
        const container = document.getElementById('list_cartas');
        container.innerHTML = "";
        
        const dataObj = globalData.cartas;
        if (!dataObj) {
            container.innerHTML = "<div style='grid-column: 1 / -1; text-align:center;'>Nenhuma carta cadastrada.</div>";
            return;
        }

        let itensArray = Object.keys(dataObj).map(key => ({ id: key, ...dataObj[key] }));
        
        if (currentFilter !== "Todos") {
            itensArray = itensArray.filter(i => i.dominio === currentFilter);
        }

        itensArray.sort((a, b) => {
            if (a.dominio !== b.dominio) return a.dominio.localeCompare(b.dominio);
            return parseInt(a.nivel) - parseInt(b.nivel);
        });

        itensArray.forEach(item => {
            const div = document.createElement('div');
            div.className = 'skill-card';
            div.innerHTML = `
                <div class="card-badges">
                    <span class="badge-domain">${item.dominio || 'Geral'}</span>
                    <span class="badge-level">Nível ${item.nivel || 1}</span>
                </div>
                <div class="card-title">${item.titulo}</div>
                <div class="card-meta">
                    <strong>Tipo:</strong> ${item.tipo || 'Desconhecido'}<br>
                    <strong>Custo:</strong> <span style="color:#ffaaaa;">${item.custo || 'Nenhum'}</span>
                </div>
                <div class="card-desc">${item.desc}</div>
                <div class="card-actions">
                    <button class="btn-edit" onclick="openCartaForm('${item.id}')">✏️ Editar</button>
                    <button class="btn-del" onclick="deleteItem('cartas', '${item.id}')">🗑️ Apagar</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // --- FUNÇÕES DE INTERFACE ---
    window.toggleDesc = (id) => document.getElementById(`desc_${id}`).classList.toggle('open');

    // Modais Passivas
    window.openPassivaForm = (id = null) => {
        document.getElementById('passiva_id').value = id || "";
        if (id && globalData.passivas[id]) {
            document.getElementById('form_passiva_title').innerText = "EDITAR VANTAGEM";
            document.getElementById('passiva_titulo').value = globalData.passivas[id].titulo || "";
            document.getElementById('passiva_desc').value = globalData.passivas[id].desc || "";
        } else {
            document.getElementById('form_passiva_title').innerText = "CRIAR NOVA VANTAGEM";
            document.getElementById('passiva_titulo').value = "";
            document.getElementById('passiva_desc').value = "";
        }
        document.getElementById('modal-passiva').classList.add('open');
    };

    window.savePassiva = () => {
        const id = document.getElementById('passiva_id').value;
        const titulo = document.getElementById('passiva_titulo').value.trim();
        const desc = document.getElementById('passiva_desc').value.trim();
        if (!titulo) return alert("Preencha o nome!");
        
        const data = { titulo, desc };
        if (id) update(ref(db, `${dbPath}/passivas/${id}`), data).then(() => document.getElementById('modal-passiva').classList.remove('open'));
        else push(ref(db, `${dbPath}/passivas`), data).then(() => document.getElementById('modal-passiva').classList.remove('open'));
    };

    // Modais Cartas
    window.openCartaForm = (id = null) => {
        document.getElementById('carta_id').value = id || "";
        if (id && globalData.cartas[id]) {
            const c = globalData.cartas[id];
            document.getElementById('form_carta_title').innerText = "EDITAR CARTA";
            document.getElementById('carta_titulo').value = c.titulo || "";
            document.getElementById('carta_dominio').value = c.dominio || "Domínio Arcano";
            document.getElementById('carta_nivel').value = c.nivel || "1";
            document.getElementById('carta_tipo').value = c.tipo || "";
            document.getElementById('carta_custo').value = c.custo || "";
            document.getElementById('carta_desc').value = c.desc || "";
        } else {
            document.getElementById('form_carta_title').innerText = "CRIAR NOVA CARTA";
            document.getElementById('carta_titulo').value = "";
            document.getElementById('carta_tipo').value = "";
            document.getElementById('carta_custo').value = "";
            document.getElementById('carta_desc').value = "";
        }
        document.getElementById('modal-carta').classList.add('open');
    };

    window.saveCarta = () => {
        const id = document.getElementById('carta_id').value;
        const titulo = document.getElementById('carta_titulo').value.trim();
        if (!titulo) return alert("Preencha o nome da carta!");

        const data = {
            titulo,
            dominio: document.getElementById('carta_dominio').value,
            nivel: parseInt(document.getElementById('carta_nivel').value),
            tipo: document.getElementById('carta_tipo').value,
            custo: document.getElementById('carta_custo').value,
            desc: document.getElementById('carta_desc').value
        };

        if (id) update(ref(db, `${dbPath}/cartas/${id}`), data).then(() => document.getElementById('modal-carta').classList.remove('open'));
        else push(ref(db, `${dbPath}/cartas`), data).then(() => document.getElementById('modal-carta').classList.remove('open'));
    };

    // Modais Classes
    window.openClasseForm = (id = null) => {
        document.getElementById('classe_id').value = id || "";
        if (id && globalData.classes[id]) {
            const c = globalData.classes[id];
            document.getElementById('form_classe_title').innerText = "EDITAR CLASSE";
            document.getElementById('classe_titulo').value = c.titulo || "";
            document.getElementById('classe_desc').value = c.desc || "";
            document.getElementById('classe_dominios').value = c.dominios || "";
            document.getElementById('classe_hab_nome').value = c.hab_nome || "";
            document.getElementById('classe_hab_desc').value = c.hab_desc || "";
        } else {
            document.getElementById('form_classe_title').innerText = "CRIAR NOVA CLASSE";
            document.getElementById('classe_titulo').value = "";
            document.getElementById('classe_desc').value = "";
            document.getElementById('classe_dominios').value = "";
            document.getElementById('classe_hab_nome').value = "";
            document.getElementById('classe_hab_desc').value = "";
        }
        document.getElementById('modal-classe').classList.add('open');
    };

    window.saveClasse = () => {
        const id = document.getElementById('classe_id').value;
        const titulo = document.getElementById('classe_titulo').value.trim();
        if (!titulo) return alert("Preencha o nome da classe!");

        const data = {
            titulo,
            desc: document.getElementById('classe_desc').value,
            dominios: document.getElementById('classe_dominios').value,
            hab_nome: document.getElementById('classe_hab_nome').value,
            hab_desc: document.getElementById('classe_hab_desc').value
        };

        if (id) update(ref(db, `${dbPath}/classes/${id}`), data).then(() => document.getElementById('modal-classe').classList.remove('open'));
        else push(ref(db, `${dbPath}/classes`), data).then(() => document.getElementById('modal-classe').classList.remove('open'));
    };

    // Modais Raças
    window.openRacaForm = (id = null) => {
        document.getElementById('raca_id').value = id || "";
        if (id && globalData.racas[id]) {
            const r = globalData.racas[id];
            document.getElementById('form_raca_title').innerText = "EDITAR RAÇA / ANCESTRALIDADE";
            document.getElementById('raca_titulo').value = r.titulo || "";
            document.getElementById('raca_linhagem').value = r.linhagem || "Animalesco";
            document.getElementById('raca_desc').value = r.desc || "";
            document.getElementById('raca_hab1_nome').value = r.hab1_nome || "";
            document.getElementById('raca_hab1_desc').value = r.hab1_desc || "";
            document.getElementById('raca_hab2_nome').value = r.hab2_nome || "";
            document.getElementById('raca_hab2_desc').value = r.hab2_desc || "";
            document.getElementById('raca_hab3_nome').value = r.hab3_nome || "";
            document.getElementById('raca_hab3_desc').value = r.hab3_desc || "";
        } else {
            document.getElementById('form_raca_title').innerText = "CRIAR NOVA RAÇA / ANCESTRALIDADE";
            document.getElementById('raca_titulo').value = "";
            document.getElementById('raca_linhagem').value = "Animalesco";
            document.getElementById('raca_desc').value = "";
            document.getElementById('raca_hab1_nome').value = "";
            document.getElementById('raca_hab1_desc').value = "";
            document.getElementById('raca_hab2_nome').value = "";
            document.getElementById('raca_hab2_desc').value = "";
            document.getElementById('raca_hab3_nome').value = "";
            document.getElementById('raca_hab3_desc').value = "";
        }
        document.getElementById('modal-raca').classList.add('open');
    };

    window.saveRaca = () => {
        const id = document.getElementById('raca_id').value;
        const titulo = document.getElementById('raca_titulo').value.trim();
        if (!titulo) return alert("Preencha o nome da raça!");

        const data = {
            titulo,
            linhagem: document.getElementById('raca_linhagem').value,
            desc: document.getElementById('raca_desc').value,
            hab1_nome: document.getElementById('raca_hab1_nome').value,
            hab1_desc: document.getElementById('raca_hab1_desc').value,
            hab2_nome: document.getElementById('raca_hab2_nome').value,
            hab2_desc: document.getElementById('raca_hab2_desc').value,
            hab3_nome: document.getElementById('raca_hab3_nome').value,
            hab3_desc: document.getElementById('raca_hab3_desc').value
        };

        if (id) update(ref(db, `${dbPath}/racas/${id}`), data).then(() => document.getElementById('modal-raca').classList.remove('open'));
        else push(ref(db, `${dbPath}/racas`), data).then(() => document.getElementById('modal-raca').classList.remove('open'));
    };

    // Deletar Geral
    window.deleteItem = (category, id) => {
        if (confirm("Apagar este item do Banco de Dados?")) {
            remove(ref(db, `${dbPath}/${category}/${id}`));
        }
    };
</script>
</body>
</html>
