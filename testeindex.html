<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha V2 (Teste) - Escória de Deus</title>
    <style>
        :root { 
            --bg: #1a1a1a; 
            --text: #ffffff;
            --theme-main: #800000;
            --theme-card: #41141a;
            --theme-border: #5a1a1f;
            --theme-input: #2a0a0d;
            --theme-light: #ffaaaa;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; padding-bottom: 80px; transition: 0.5s; }
        
        /* BOTÃO DE VERSÃO */
        .version-toggle { background: #222; border: 2px solid var(--theme-light); color: var(--theme-light); padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-bottom: 20px; display: inline-block; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .version-toggle:hover { background: var(--theme-light); color: #000; box-shadow: 0 0 15px var(--theme-light); }

        .container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; max-width: 1400px; width: 100%; }
        .col { display: flex; flex-direction: column; gap: 15px; }
        
        .card { background: var(--theme-card); border-radius: 12px; padding: 15px; border: 1px solid var(--theme-border); box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: relative; }
        .header-label { background: var(--theme-main); text-align: center; border-radius: 20px; padding: 5px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        input, textarea { background: var(--theme-input); border: 1px solid #555; color: white; padding: 8px; border-radius: 20px; width: 100%; box-sizing: border-box; margin-bottom: 5px; }
        input[readonly] { background: rgba(0,0,0,0.3); color: #aaa; border: 1px dashed #444; cursor: not-allowed; }
        label { font-size: 10px; color: var(--theme-light); font-weight: bold; margin-left: 10px; text-transform: uppercase; display: block; }
        .hab-body textarea { min-height: 120px; resize: vertical; line-height: 1.4; font-size: 14px; }
        
        .avatar-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; position: relative; }
        .avatar-circle { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--theme-main); background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; background-size: cover; background-position: center; position: relative; }
        .avatar-circle input[type="file"] { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; }
        .theme-btn { position: absolute; top: 0; right: 20px; background: #222; border: 2px solid var(--theme-light); color: var(--theme-light); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 20; transition: 0.3s; }
        .theme-btn:hover { background: var(--theme-light); color: #000; }
        
        .color-picker { display: none; position: absolute; top: 40px; right: 0; background: #222; border: 1px solid #555; padding: 10px; border-radius: 10px; grid-template-columns: repeat(4, 1fr); gap: 8px; z-index: 30; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .color-picker.open { display: grid; }
        .color-swatch { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-swatch:hover { transform: scale(1.2); border-color: white; }

        /* NOVOS MARCADORES V2 */
        .marker-section { margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; border: 1px solid var(--theme-border); }
        .marker-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 5px; }
        .marker-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; min-height: 30px; }
        .marker-item { cursor: pointer; font-size: 24px; opacity: 0.2; transition: 0.3s; filter: grayscale(1); }
        .marker-item.active { opacity: 1; filter: grayscale(0); drop-shadow: 0 0 5px currentColor; }
        
        /* Cores dos Recursos V2 */
        .esp-color { color: #4fc3f7; } /* Esperança - Azul/Branco */
        .est-color { color: #ff9800; } /* Estresse - Laranja */
        .vida-color { color: #f44336; } /* Vida - Vermelho */
        
        .btn-count { background: var(--theme-main); border: 1px solid var(--theme-light); color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; line-height: 1; font-weight: bold; display: flex; align-items: center; justify-content: center;}

        /* ATRIBUTOS */
        .attr-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .attr-box { background: rgba(255,255,255,0.05); border: 1px solid var(--theme-border); border-radius: 12px; padding: 10px 2px; text-align: center; transition: 0.5s; position: relative; }
        .attr-box input { font-size: 28px; font-weight: bold; text-align: center; border: none; background: transparent; color: white; }

        /* ESTILOS DAS HABILIDADES */
        .hab-item { background: rgba(0,0,0,0.3); border: 1px solid var(--theme-border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
        .hab-header { display: flex; align-items: center; padding: 8px; gap: 5px; }
        .hab-title { flex-grow: 1; font-weight: bold; border-radius: 10px !important; margin: 0 !important; }
        .hab-item input[readonly] { color: #eee; cursor: default; border-color: transparent; background: transparent; }
        .hab-item textarea[readonly] { color: #aaa; cursor: default; border-color: transparent; background: transparent; }
        .hab-dice { width: 85px !important; text-align: center; border-radius: 10px !important; margin: 0 !important; }
        .hab-toggle { cursor: pointer; color: var(--theme-light); font-size: 12px; padding: 0 5px; }
        .hab-body { padding: 8px; display: none; border-top: 1px solid var(--theme-border); }
        .hab-body.open { display: block; }
        
        .btn-add { background: #22aa22; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-del { color: #ff4444; background: transparent; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }

        @media (max-width: 768px) { .container { display: block; } .col { display: none; width: 100%; animation: fadeEffect 0.5s; } .col.active { display: flex; } .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--theme-main); padding: 15px 0; justify-content: center; gap: 50px; z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.7); border-top: 1px solid var(--theme-light); } .nav-btn { background: rgba(0,0,0,0.3); border: 2px solid white; color: white; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; } @keyframes fadeEffect { from {opacity: 0;} to {opacity: 1;} } }
    </style>
</head>
<body>

<a href="index.html" class="version-toggle" id="btn-back-v1">◀ Voltar para Ficha V1</a>

<div class="container">
    <div class="col active" id="col-0">
        <div class="card">
            <div class="header-label">Personagem V2</div>
            <div class="avatar-container">
                <div class="avatar-circle" id="avatar_display"><input type="file" id="img_upload" accept="image/*"></div>
                <button class="theme-btn" onclick="toggleColorPicker()">🎨</button>
                <div id="colorPicker" class="color-picker"></div>
                <input type="text" id="char_name" style="background:transparent; border:none; text-align:center; font-size:18px; font-weight:bold; margin-top:10px; color:white;" placeholder="NOME DO PERSONAGEM">
            </div>
            <label>EXPERIÊNCIA (XP)</label><input type="text" id="xp_total" placeholder="0">
            <label>FLORINS</label><input type="text" id="florins">
            <label>ARQUÉTIPO / ORIGEM</label><input type="text" id="arquetipo">
            
            <div class="header-label" style="margin-top:15px;">Atributos Base</div>
            <div class="attr-container" id="attr_container">
                <div class="attr-box"><input type="number" id="poder" value="0"><div>PODER</div></div>
                <div class="attr-box"><input type="number" id="habilidade" value="0"><div>HAB.</div></div>
                <div class="attr-box"><input type="number" id="resistencia" value="0"><div>RES.</div></div>
            </div>

            <div class="header-label" style="margin-top:15px;">Recursos e Saúde</div>
            
            <div class="marker-section">
                <label style="text-align:center; color:#4fc3f7;">ESPERANÇA (Max 5)</label>
                <div class="marker-controls">
                    <button class="btn-count" onclick="updateMarkerCount('esperanca', -1)">-</button>
                    <span id="count_esperanca" style="font-weight:bold; color:#4fc3f7;">0</span>
                    <button class="btn-count" onclick="updateMarkerCount('esperanca', 1)">+</button>
                </div>
                <div id="display_esperanca" class="marker-display"></div>
            </div>

            <div class="marker-section">
                <label style="text-align:center; color:#ff9800;">ESTRESSE (Max 5)</label>
                <div class="marker-controls">
                    <button class="btn-count" onclick="updateMarkerCount('estresse', -1)">-</button>
                    <span id="count_estresse" style="font-weight:bold; color:#ff9800;">0</span>
                    <button class="btn-count" onclick="updateMarkerCount('estresse', 1)">+</button>
                </div>
                <div id="display_estresse" class="marker-display"></div>
            </div>

            <div class="marker-section">
                <label style="text-align:center; color:#f44336;">MARCAS DE VIDA (Max 5 a 8)</label>
                <div style="text-align:center; font-size:11px; color:#aaa; margin-bottom:5px;">
                    Limiares: Menor (R+3) | Maior (R+6) | Severo (R+9)
                </div>
                <div class="marker-controls">
                    <button class="btn-count" onclick="updateMarkerCount('vida', -1)">-</button>
                    <span id="count_vida" style="font-weight:bold; color:#f44336;">5</span>
                    <button class="btn-count" onclick="updateMarkerCount('vida', 1)">+</button>
                </div>
                <div id="display_vida" class="marker-display"></div>
            </div>
        </div>
    </div>

    <div class="col" id="col-1">
        <div class="card">
            <div class="header-label">Perícias Narrativas (+2 fixo)</div>
            <label>Passados / Experiências <button class="btn-add" onclick="createManual('pericias_v2')">+</button></label>
            <div id="list_pericias_v2" style="margin-top:5px; margin-bottom:15px;"></div>
            
            <div class="header-label">Habilidades de Ação</div>
            
            <label>Passivas (Sempre Ativas) <button class="btn-add" onclick="createManual('hab_passivas')">+</button></label>
            <div id="list_hab_passivas" style="margin-top:5px;"></div>
            
            <label style="margin-top:10px;">Ativas (Custo em Esperança) <button class="btn-add" onclick="createManual('hab_ativas')">+</button></label>
            <div id="list_hab_ativas" style="margin-top:5px;"></div>
            
            <label style="margin-top:10px;">De Risco (Custo: 1 Medo / 1 Estresse) <button class="btn-add" onclick="createManual('hab_risco')">+</button></label>
            <div id="list_hab_risco" style="margin-top:5px;"></div>
        </div>
    </div>

    <div class="col" id="col-2">
        <div class="card">
            <div class="header-label">Equipamento de Combate</div>
            
            <label>Armas (Bônus Fixo / Tags) <button class="btn-add" onclick="createManual('armas')">+</button></label>
            <div id="list_armas" style="margin-top:5px; margin-bottom:15px;"></div>

            <label>Armaduras (Redução / Usos) <button class="btn-add" onclick="createManual('armaduras')">+</button></label>
            <div id="list_armaduras" style="margin-top:5px; margin-bottom:15px;"></div>

            <hr style="border:0; border-top:1px solid #5a1a1f; margin: 20px 0;">
            
            <div class="header-label">Inventário Rápido (Max 5)</div>
            <label>Itens Consumíveis e Utilidades <button class="btn-add" onclick="createManual('inventario')">+</button></label>
            <div id="list_inventario" style="margin-top:5px;"></div>
        </div>
    </div>
</div>

<div class="mobile-nav"><button class="nav-btn" onclick="changeColumn(-1)">◀</button><button class="nav-btn" onclick="changeColumn(1)">▶</button></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, update, onValue, remove, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCvxxwfsonP5a45nbcz34cxYhXaWBZVhwQ",
        authDomain: "ed-rpg---sistema-de-fichas.firebaseapp.com",
        databaseURL: "https://ed-rpg---sistema-de-fichas-default-rtdb.firebaseio.com",
        projectId: "ed-rpg---sistema-de-fichas",
        storageBucket: "ed-rpg---sistema-de-fichas.firebasestorage.app",
        messagingSenderId: "350999444010",
        appId: "1:350999444010:web:d89f31d13e449b8fbfa153"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const fichaID = urlParams.get('p') || "personagem_padrao";
    
    // Atualiza o link do botão de voltar
    document.getElementById('btn-back-v1').href = "index.html?p=" + fichaID;

    // ATENÇÃO: Salvando no nó V2 isolado!
    const dbPath = 'fichas_v2/' + fichaID;

    let globalCharData = {};

    let currentColumn = 0; const totalColumns = 3;
    window.changeColumn = (dir) => { const cols = document.querySelectorAll('.col'); cols[currentColumn].classList.remove('active'); currentColumn += dir; if (currentColumn < 0) currentColumn = 0; if (currentColumn >= totalColumns) currentColumn = totalColumns - 1; cols[currentColumn].classList.add('active'); window.scrollTo({ top: 0, behavior: 'smooth' }); };
    
    const themes = { sangue: { main: '#800000', card: '#41141a', border: '#5a1a1f', input: '#2a0a0d', light: '#ffaaaa' }, oceano: { main: '#0d47a1', card: '#0a192f', border: '#1565c0', input: '#0d2345', light: '#82b1ff' }, floresta: { main: '#1b5e20', card: '#0f2913', border: '#2e7d32', input: '#0a210f', light: '#a5d6a7' }, ametista: { main: '#4a148c', card: '#240a33', border: '#7b1fa2', input: '#210530', light: '#e1bee7' } };
    
    window.toggleColorPicker = () => { document.getElementById('colorPicker').classList.toggle('open'); };
    window.setTheme = (themeName) => { const t = themes[themeName]; if(!t) return; const r = document.documentElement.style; r.setProperty('--theme-main', t.main); r.setProperty('--theme-card', t.card); r.setProperty('--theme-border', t.border); r.setProperty('--theme-input', t.input); r.setProperty('--theme-light', t.light); update(ref(db, dbPath), { color_theme: themeName }); document.getElementById('colorPicker').classList.remove('open'); };
    const picker = document.getElementById('colorPicker'); Object.keys(themes).forEach(key => { const div = document.createElement('div'); div.className = 'color-swatch'; div.style.backgroundColor = themes[key].main; div.onclick = () => setTheme(key); picker.appendChild(div); });
    
    const camposParaSalvar = ['char_name', 'xp_total', 'florins', 'arquetipo', 'poder', 'habilidade', 'resistencia', 'color_theme'];

    // Lógica dos Novos Marcadores
    window.updateMarkerCount = (type, mod) => {
        let currentTotal = globalCharData.marcadores?.[type]?.total || (type === 'vida' ? 5 : 0);
        let newTotal = currentTotal + mod; if(newTotal < 0) newTotal = 0;
        update(ref(db, `${dbPath}/marcadores/${type}`), { total: newTotal });
    };

    window.togglePoint = (type, index) => { 
        const key = `p_${index}`; 
        const isActive = document.getElementById(`${type}_${index}`).classList.contains('active'); 
        update(ref(db, `${dbPath}/marcadores/${type}/pontos`), { [key]: !isActive }); 
    };

    function renderMarkers(type, total, pontos) { 
        const container = document.getElementById('display_' + type); 
        const countSpan = document.getElementById('count_' + type); 
        container.innerHTML = ""; 
        
        let finalTotal = total !== undefined ? total : 0;
        if (type === 'vida' && total === undefined) finalTotal = 5;
        countSpan.innerText = finalTotal; 
        
        let icon = '●';
        let cssClass = '';
        if(type === 'esperanca') { icon = '✦'; cssClass = 'esp-color'; }
        else if(type === 'estresse') { icon = '⚡'; cssClass = 'est-color'; }
        else if(type === 'vida') { icon = '♥'; cssClass = 'vida-color'; }

        for(let i=0; i < finalTotal; i++) { 
            const isActive = pontos && pontos[`p_${i}`] === true; 
            container.innerHTML += `<span id="${type}_${i}" class="marker-item ${cssClass} ${isActive ? 'active' : ''}" onclick="togglePoint('${type}', ${i})">${icon}</span>`; 
        } 
    }

    // Gerenciador de Listas Genéricas
    window.createManual = (category) => {
        let data = { titulo: "", desc: "" };
        if (category === 'pericias_v2') { data.teste = "+2"; }
        else if (category === 'armaduras') { data.teste = "Red: 2"; }
        else if (category === 'hab_ativas') { data.teste = "2 Esp."; }
        else if (category === 'hab_risco') { data.teste = "1 Medo"; }
        else { data.teste = ""; } 
        
        push(ref(db, `${dbPath}/habilidades/${category}`), data);
    };

    window.removeItem = (category, id) => { if(confirm("Apagar item?")) remove(ref(db, `${dbPath}/habilidades/${category}/${id}`)); };
    window.toggleHab = (id) => { document.getElementById('body_' + id).classList.toggle('open'); };
    window.saveHab = (cat, id, field, val) => { update(ref(db, `${dbPath}/habilidades/${cat}/${id}`), { [field]: val }); };

    function renderGenericList(category, data, placeholderTeste) { 
        const container = document.getElementById('list_' + category); 
        if(!container) return; 
        container.innerHTML = ""; 
        if(!data) return; 
        
        Object.keys(data).forEach(id => { 
            const item = data[id]; 
            const div = document.createElement('div'); 
            div.className = 'hab-item'; 
            div.innerHTML = `
                <div class="hab-header">
                    <span class="hab-toggle" onclick="toggleHab('${id}')">▼</span>
                    <input type="text" class="hab-title" value="${item.titulo || ''}" onchange="saveHab('${category}','${id}','titulo',this.value)" placeholder="Nome">
                    <input type="text" class="hab-dice" value="${item.teste || ''}" onchange="saveHab('${category}','${id}','teste',this.value)" placeholder="${placeholderTeste}">
                    <button class="btn-del" onclick="removeItem('${category}','${id}')">✖</button>
                </div>
                <div class="hab-body" id="body_${id}">
                    <textarea onchange="saveHab('${category}','${id}','desc',this.value)" placeholder="Descrição e anotações...">${item.desc || ''}</textarea>
                </div>`; 
            container.appendChild(div); 
        }); 
    }

    // Auto-Save de campos base
    document.addEventListener('input', (e) => {
        const target = e.target;
        if (camposParaSalvar.includes(target.id)) {
            update(ref(db, dbPath), { [target.id]: target.value });
        }
    });

    // Listener Principal V2
    onValue(ref(db, dbPath), (snapshot) => {
        const dados = snapshot.val(); if (!dados) return; globalCharData = dados;
        
        if (dados.color_theme) { const t = themes[dados.color_theme]; if (t) { const r = document.documentElement.style; r.setProperty('--theme-main', t.main); r.setProperty('--theme-card', t.card); r.setProperty('--theme-border', t.border); r.setProperty('--theme-input', t.input); r.setProperty('--theme-light', t.light); } }

        camposParaSalvar.forEach(id => {
            if (dados[id] !== undefined && id !== 'color_theme') {
                const el = document.getElementById(id);
                if (el && document.activeElement !== el) { el.value = dados[id]; }
            }
        });

        if (dados.char_img) document.getElementById('avatar_display').style.backgroundImage = `url(${dados.char_img})`;
        
        // Renderiza Marcadores Novos
        renderMarkers('esperanca', dados.marcadores?.['esperanca']?.total, dados.marcadores?.['esperanca']?.pontos);
        renderMarkers('estresse', dados.marcadores?.['estresse']?.total, dados.marcadores?.['estresse']?.pontos);
        renderMarkers('vida', dados.marcadores?.['vida']?.total, dados.marcadores?.['vida']?.pontos);
        
        // Renderiza Listas Novas
        renderGenericList('pericias_v2', dados.habilidades?.['pericias_v2'], 'Bônus');
        renderGenericList('hab_passivas', dados.habilidades?.['hab_passivas'], 'Info');
        renderGenericList('hab_ativas', dados.habilidades?.['hab_ativas'], 'Custo');
        renderGenericList('hab_risco', dados.habilidades?.['hab_risco'], 'Risco');
        renderGenericList('armas', dados.habilidades?.['armas'], 'Dano Fixo');
        renderGenericList('armaduras', dados.habilidades?.['armaduras'], 'Redução');
        renderGenericList('inventario', dados.habilidades?.['inventario'], 'Qtd/Usos');
    });

    document.getElementById('img_upload').addEventListener('change', (e) => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = (readerEvent) => { const image = new Image(); image.onload = () => { const canvas = document.createElement('canvas'); const maxSize = 300; let width = image.width; let height = image.height; if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } } canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(image, 0, 0, width, height); const dataUrl = canvas.toDataURL('image/jpeg', 0.7); document.getElementById('avatar_display').style.backgroundImage = `url(${dataUrl})`; update(ref(db, dbPath), { char_img: dataUrl }); }; image.src = readerEvent.target.result; }; reader.readAsDataURL(file); });
</script>
</body>
</html>
